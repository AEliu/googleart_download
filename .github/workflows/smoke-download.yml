name: Smoke Download

on:
  workflow_dispatch:
    inputs:
      smoke_case:
        description: "Named built-in smoke case"
        required: false
        default: "girl_with_pearl_earring"
      artwork_input:
        description: "Optional override: artwork URL, g.co short link, or bare asset id"
        required: false
        default: ""

jobs:
  smoke-download:
    runs-on: ubuntu-latest

    env:
      SMOKE_CASE: ${{ inputs.smoke_case || 'girl_with_pearl_earring' }}
      ARTWORK_INPUT_OVERRIDE: ${{ inputs.artwork_input || '' }}
      OUTPUT_DIR: /tmp/googleart-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev

      - name: Resolve smoke artwork input
        id: resolve
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          fixture_path = Path("tests/fixtures/smoke_assets.json")
          payload = json.loads(fixture_path.read_text(encoding="utf-8"))
          by_id = {item["id"]: item for item in payload}

          override = os.environ["ARTWORK_INPUT_OVERRIDE"].strip()
          if override:
              artwork_input = override
              selected_case = "custom"
          else:
              selected_case = os.environ["SMOKE_CASE"].strip() or "girl_with_pearl_earring"
              if selected_case not in by_id:
                  available = ", ".join(sorted(by_id))
                  raise SystemExit(f"unknown smoke_case '{selected_case}'. Available cases: {available}")
              artwork_input = by_id[selected_case]["input"]

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as handle:
              handle.write(f"selected_case={selected_case}\n")
              handle.write(f"artwork_input={artwork_input}\n")
          PY

      - name: Run lightweight smoke download
        run: |
          uv run artx "${{ steps.resolve.outputs.artwork_input }}" \
            -o "$OUTPUT_DIR" \
            --max-dimension 1024 \
            --jpeg-preset web
        id: download

      - name: Verify smoke output
        run: |
          python - <<'PY'
          from pathlib import Path

          output_dir = Path("/tmp/googleart-smoke")
          artifact_suffixes = {".jpg", ".jpeg", ".tif", ".tiff"}
          files = sorted(
              path
              for path in output_dir.iterdir()
              if path.is_file() and path.suffix.lower() in artifact_suffixes
          )
          if len(files) != 1:
              raise SystemExit(f"expected exactly one output file, found {len(files)}: {[p.name for p in files]}")

          output = files[0]
          print(f"smoke_output={output}")
          print(f"smoke_size_bytes={output.stat().st_size}")
          PY

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-download-output
          path: /tmp/googleart-smoke/*
